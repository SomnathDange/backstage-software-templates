name: ${{ values.app_name }}-cicd

permissions:
  contents: write

on:
  push:
    branches: 
      - main
      - master
    

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ '${{ secrets.DOCKERHUB_USERNAME }}' }}
          password: ${{ '${{ secrets.DOCKERHUB_TOKEN }}' }}

      -
        name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${{ '${{ github.sha }}' }} | cut -c1-6)" >> $GITHUB_ENV

      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: sdange/${{ values.app_name }}:${{ '${{ env.SHORT_SHA }}' }}
    outputs:
      COMMIT_ID: ${{ '${{ env.SHORT_SHA }}' }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ '${{ secrets.GITHUB_TOKEN }}' }}

      - name: Modify values file
        shell: bash
        run: |
          echo ${{needs.build.outputs.commit_id}}
          # install a proper yq binary via apt instead of pip
          sudo apt-get update && sudo apt-get install -y yq
          yq -Yi '.image.tag = "${{ '${{needs.build.outputs.commit_id}}' }}"' charts/${{ values.app_name }}/values-${{ values.app_env }}.yaml

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Updates values.yaml with commit ${{ '${{needs.build.outputs.commit_id}}' }}'

      - name: Install argocd
        shell: bash
        run: |
          echo "Installing argocd"
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/
            
      - name: argocd login
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure  \
            --grpc-web \
            --username admin \
            --password  ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}
          
      - name: Ensure argocd repo and app
        shell: bash
        run: |

          # Connects the argocd repo
          repo="https://github.com/somanath-dange-backstage/${{values.app_name}}.git"
          argocd repo list | grep -q $repo || argocd repo add $repo

          # Creates the argocd app
          argocd app get ${{values.app_name}} || argocd app create ${{values.app_name}} \
            --repo $repo \
            --path charts/${{values.app_name}} \
            --dest-namespace ${{values.app_env}} \
            --dest-server https://kubernetes.default.svc \
            --values values-${{values.app_env}}.yaml \
            --revision main \
            --sync-policy manual \
            --sync-option CreateNamespace=true

      - name: Argocd app sync
        shell: bash
        run: |
          echo "Logging into argocd server"
          argocd login argocd-server.argocd \
            --insecure  \
            --grpc-web \
            --username admin \
            --password  ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}
          echo "Running argocd app sync"
          argocd app sync ${{ values.app_name }}
          argocd app wait ${{values.app_name}} --timeout 180
